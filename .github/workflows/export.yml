name: Export katersat to JSON

on:
  schedule:
    - cron: '0 2 * * 0'   # weekly, Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest katersat data
        run: python3 update.py

      - name: Export to JSON
        run: python3 export.py --output extracted --compress

      - name: Validate exports
        run: python3 validators.py extracted

      - name: Commit and push exports
        run: |
          git config user.name "katersat-bot"
          git config user.email "actions@github.com"
          git add extracted/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update katersat JSON exports [skip ci]"
          git push
