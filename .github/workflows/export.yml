name: Export katersat to JSON

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/export.yml'
  schedule:
    - cron: '0 2 * * 0'   # weekly, Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch latest katersat data
        run: python3 update.py

      - name: Archive data if changed
        run: python3 scripts/archive_data.py

      - name: Commit data archive to main
        run: |
          git config user.name "katersat-bot"
          git config user.email "actions@github.com"
          git add data.sql data/
          git diff --cached --quiet && echo "  No data changes to commit" || \
            git commit -m "data: archive katersat $(date -u +%Y-%m-%d) [skip ci]" && git push

      - name: Export to JSON
        run: python3 scripts/export.py --output exports --compress

      - name: Validate exports
        run: python3 scripts/validators.py exports

      - name: Deploy to GitHub Pages
        run: |
          cd exports
          git init -b gh-pages
          git config user.name "katersat-bot"
          git config user.email "actions@github.com"
          touch .nojekyll
          git add .
          git commit -m "chore: update JSON exports $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages
